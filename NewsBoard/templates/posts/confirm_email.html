{% extends 'posts/base.html' %}

{% block content %}
<h1>Подтверждение e-mail</h1>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <input type="text" name="code" placeholder="Код из письма">
    <button type="submit">Подтвердить</button>
</form>
{% endblock %}
