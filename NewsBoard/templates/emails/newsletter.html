<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        p { font-size: 16px; line-height: 1.5; color: #555; }
        a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p>{{ content|linebreaks }}</p>
        <p>
            Перейти к сайту: <a href="{{ site_url }}">{{ site_url }}</a>
        </p>
    </div>
</body>
</html>
